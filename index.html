<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Greeting 🌙</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Intro */
#intro {
  position: absolute;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
  margin: 10px;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  background: #ff1a8c;
  transform: scale(1.05);
}

/* Main */
#app {
  display: none;
  padding-top: 100px;
}

#message {
  font-size: 20px;
  margin: 20px;
  min-height: 100px;
  white-space: pre-line;
}

/* Stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* Moon */
.moon {
  position: absolute;
  top: 50px;
  right: 60px;
  width: 80px;
  height: 80px;
  background: #f5f3ce;
  border-radius: 50%;
  box-shadow: 0 0 30px #fff;
}

/* Game */
#game {
  display: none;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

</style>
</head>

<body>

<div id="intro">
  <h1>🌙 Eid Greeting</h1>
  <p>Tap to open 😊</p>
  <button onclick="start()">Start</button>
</div>

<div class="moon"></div>

<script>
for(let i=0;i<40;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*100+"%";
  star.style.left=Math.random()*100+"%";
  document.body.appendChild(star);
}
</script>

<div id="app">
  <h2>👋 Hello Mariyam</h2>
  <p>From Unais 😊</p>

  <div id="message"></div>

  <button onclick="showMessage()">Eid Message 🌙</button>
  <button onclick="startGame()">Play Game 🎮</button>

  <div id="game">
    <h3>🎯 Guess the Number (1–10)</h3>
    <input type="number" id="guess">
    <button onclick="checkGuess()">Guess</button>
    <p id="result"></p>
  </div>
</div>

<script>

function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";
}

function typeEffect(text){
  let i=0;
  document.getElementById("message").innerHTML="";

  function typing(){
    if(i<text.length){
      document.getElementById("message").innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,40);
    }
  }
  typing();
}

function showMessage(){
  typeEffect("Eid Mubarak Mariyam 🌙✨\n\nWishing you happiness, peace, and lots of good moments 😊\n\nMay this Eid bring joy and positivity to your life 🌸");
}

/* Game */
let num=Math.floor(Math.random()*10)+1;

function startGame(){
  document.getElementById("game").style.display="block";
}

function checkGuess(){
  let g=document.getElementById("guess").value;
  if(g==num){
    document.getElementById("result").innerText="🎉 Correct!";
  } else {
    document.getElementById("result").innerText="Try again 😅";
  }
}

</script>

</body>
</html>
