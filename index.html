<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Greeting 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; transition: all 0.4s ease; }
        
        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { font-weight: 600; margin-bottom: 20px; font-size: 1.5rem; }
        p { line-height: 1.6; opacity: 0.9; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

        button {
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: #ff4da6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(255, 77, 166, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            background: #ff1a8c;
            box-shadow: 0 8px 20px rgba(255, 77, 166, 0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }

        .hidden { display: none; opacity: 0; transform: scale(0.9); }
        .visible { display: block; opacity: 1; transform: scale(1); }

        /* Simple Firework Sparkle */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card" id="step1">
        <h2>Hey there! ✨</h2>
        <p>I built something small for someone special. Is that you?</p>
        <input type="text" id="nameInput" placeholder="Enter your name...">
        <div class="btn-group">
            <button onclick="toStep2()">Yes, it's me! 😊</button>
        </div>
    </div>

    <div class="card hidden" id="step2">
        <h2>Welcome, <span id="display-name"></span>! 🌙</h2>
        <p>Before we start, tell me... How are you feeling today?</p>
        <div class="btn-group">
            <button onclick="toStep3('Great! That makes me so happy to hear. ✨')">I'm doing great! 😊</button>
            <button onclick="toStep3('Aww, hope this little surprise cheers you up! ❤️')">Just okay. 😐</button>
        </div>
    </div>

    <div class="card hidden" id="step3">
        <p id="mood-reply"></p>
        <h2>Ready for your Eid surprise? 🎁</h2>
        <div class="btn-group">
            <button onclick="finalShow()">Show me! 🌙✨</button>
        </div>
    </div>

    <div class="card hidden" id="step4">
        <h1 style="color: #ffeb3b; margin: 0;">Eid Mubarak</h1>
        <h2 id="final-greet"></h2>
        <p>May your life be filled with endless joy, peace, and beautiful moments. You deserve the best! 🌸</p>
        <button onclick="location.reload()" style="background: transparent; border: 1px solid white; margin-top: 20px;">Restart 🔄</button>
    </div>

<script>
    let userName = "";

    function toStep2() {
        const input = document.getElementById('nameInput');
        if (input.value.trim() === "") {
            input.style.borderColor = "red";
            return;
        }
        userName = input.value;
        document.getElementById('display-name').innerText = userName;
        switchCard('step1', 'step2');
    }

    function toStep3(message) {
        document.getElementById('mood-reply').innerText = message;
        switchCard('step2', 'step3');
    }

    function finalShow() {
        document.getElementById('final-greet').innerText = userName + " ✨";
        switchCard('step3', 'step4');
        startSparkles();
    }

    function switchCard(oldId, newId) {
        const oldCard = document.getElementById(oldId);
        const newCard = document.getElementById(newId);
        
        oldCard.classList.add('hidden');
        setTimeout(() => {
            oldCard.style.display = "none";
            newCard.style.display = "block";
            setTimeout(() => newCard.classList.add('visible'), 50);
        }, 400);
    }

    function startSparkles() {
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = '50%';
                s.style.top = '50%';
                s.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
                s.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1000);
            }, i * 50);
        }
    }
</script>
</body>
</html>
