<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak ✨</title>

<style>
:root {
  --primary: #ff4da6;
  --secondary: #7000ff;
  --glass: rgba(255, 255, 255, 0.1);
  --text: #ffffff;
}

body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e3c72, #2a5298, #000);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

/* Glassmorphism Card */
.container {
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 40px;
  width: 90%;
  max-width: 450px;
  border-radius: 30px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  text-align: center;
  animation: fadeIn 1s ease-out;
  position: relative;
  z-index: 10;
}

h2 { font-weight: 300; letter-spacing: 2px; }

input {
  width: 80%;
  padding: 12px 20px;
  margin: 15px 0;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 1rem;
  transition: 0.3s;
}

input::placeholder { color: #ddd; }
input:focus { background: rgba(255,255,255,0.3); transform: scale(1.02); }

button {
  cursor: pointer;
  padding: 12px 30px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  color: white;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 20px rgba(255, 77, 166, 0.3);
}

button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 77, 166, 0.5); }
button:active { transform: scale(0.95); }

/* Games Section */
.game-card { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
.stat-box { display: flex; justify-content: space-around; font-size: 0.9rem; margin-bottom: 20px; }

/* Fireworks & Particles */
.particle {
  position: absolute;
  pointer-events: none;
  border-radius: 50%;
  animation: fly 1.5s ease-out forwards;
}

@keyframes fly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container" id="mainCard">
  
  <div id="intro">
    <h1 style="font-size: 3rem;">🌙</h1>
    <h2>Welcome Home</h2>
    <p>Enter your name to start the magic</p>
    <input type="text" id="nameInput" placeholder="Beautiful Name Goes Here...">
    <br>
    <button onclick="startExperience()">Unlock Joy ✨</button>
  </div>

  <div id="gameView" style="display:none;">
    <h3>Hi, <span id="userName" style="color: var(--primary);"></span> ✨</h3>
    <p id="chatText">I have some small gifts for you...</p>
    
    <div class="stat-box">
      <span>Score: <b id="scoreLabel">0</b></span>
      <span>Best: <b id="bestLabel">0</b></span>
    </div>

    <div id="gameContent">
      <div id="clickSection">
        <p>Tap the heart as fast as you can!</p>
        <button onclick="handleTap()" style="font-size: 1.5rem; background: none; border: 2px solid var(--primary);">❤️</button>
      </div>
      
      <br>
      <button onclick="finishSession()">I'm Done, Reveal Surprise! 🎁</button>
    </div>
  </div>

  <div id="finalView" style="display:none;">
    <h1 style="color: gold;">🌙 Eid Mubarak!</h1>
    <p id="finalMsg"></p>
    <div style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;">
      Total Happiness Points: <span id="finalScore"></span>
    </div>
    <button onclick="location.reload()">Play Again 🔄</button>
  </div>

</div>

<script>
let score = 0;
let best = localStorage.getItem("eidBest") || 0;
document.getElementById("bestLabel").innerText = best;

function startExperience() {
    let name = document.getElementById("nameInput").value;
    if(!name) { alert("Please enter your name, gorgeous!"); return; }
    
    document.getElementById("userName").innerText = name;
    document.getElementById("intro").style.display = "none";
    document.getElementById("gameView").style.display = "block";
    createParticles(20);
}

function handleTap() {
    score++;
    document.getElementById("scoreLabel").innerText = score;
    createParticles(5);
    
    // Tiny bounce effect on score
    document.getElementById("scoreLabel").style.transform = "scale(1.2)";
    setTimeout(() => document.getElementById("scoreLabel").style.transform = "scale(1)", 100);
}

function createParticles(count) {
    for(let i=0; i<count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 4;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
        
        // Random direction
        const x = (Math.random() - 0.5) * 300;
        const y = (Math.random() - 0.5) * 300;
        p.style.setProperty('--x', x + 'px');
        p.style.setProperty('--y', y + 'px');
        
        // Position at center of button/screen
        p.style.left = '50%';
        p.style.top = '50%';
        
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1500);
    }
}

function finishSession() {
    document.getElementById("gameView").style.display = "none";
    document.getElementById("finalView").style.display = "block";
    document.getElementById("finalScore").innerText = score;
    
    if(score > best) {
        localStorage.setItem("eidBest", score);
        document.getElementById("finalMsg").innerText = "Wow! A new high score of love! You are amazing. May your Eid be as bright as your smile. ✨";
    } else {
        document.getElementById("finalMsg").innerText = "Eid Mubarak! You've filled the day with so much joy already. Keep shining! 🌙";
    }
    
    // Continuous fireworks for 3 seconds
    let interval = setInterval(() => createParticles(15), 300);
    setTimeout(() => clearInterval(interval), 3000);
}
</script>

</body>
</html>
