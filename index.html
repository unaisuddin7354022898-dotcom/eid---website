<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Friend 🌙</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* Intro Screen */
#intro {
  position: absolute;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#intro h1 {
  font-size: 40px;
}

/* Buttons */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

button:hover {
  background: #ff1a8c;
  transform: scale(1.05);
}

/* Main App */
#app {
  display: none;
  padding-top: 100px;
}

#chatBox {
  width: 80%;
  margin: auto;
  min-height: 150px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  font-size: 18px;
}

#game {
  display: none;
  margin-top: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <h1>🌙 Welcome...</h1>
  <p>A small surprise is waiting 💖</p>
  <button onclick="start()">Start</button>
</div>

<!-- Main App -->
<div id="app">
  <h2>Hey 👋 I’m your friend today 😊</h2>

  <div id="chatBox">
    <p id="chatText">Click below to talk with me 😄</p>
  </div>

  <button onclick="chat()">Talk 💬</button>
  <button onclick="startGame()">Play Game 🎮</button>

  <!-- Game -->
  <div id="game">
    <h3>🎯 Guess the Number (1–10)</h3>
    <input type="number" id="guess" placeholder="Enter number">
    <button onclick="checkGuess()">Guess</button>
    <p id="result"></p>
  </div>
</div>

<script>

/* Chat Lines */
let chatLines = [
  "Eid Mubarak 🌙✨",
  "Aaj ka din special hai 💖",
  "Main tumhara virtual friend hoon 😄",
  "Kya tum khush ho aaj? 😊"
];

let index = 0;

function start(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function chat(){
  if(index < chatLines.length){
    document.getElementById("chatText").innerText = chatLines[index];
    index++;
  } else {
    document.getElementById("chatText").innerText = "Bas itni baatein 😅 ab game khelo!";
  }
}

/* Game Logic */
let randomNumber = Math.floor(Math.random()*10)+1;

function startGame(){
  document.getElementById("game").style.display = "block";
}

function checkGuess(){
  let guess = document.getElementById("guess").value;

  if(guess == randomNumber){
    document.getElementById("result").innerText = "🎉 Correct! You win!";
  } else {
    document.getElementById("result").innerText = "❌ Try again!";
  }
}

</script>

</body>
</html>
